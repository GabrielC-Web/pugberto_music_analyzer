<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pugberto Dancing Music Analyzer</title>
    <link rel="stylesheet" href="styles.css">
    <!-- <link href="/dist/output.css" rel="stylesheet"> -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="shortcut icon" type="image/x-icon" href="/res/pugberto_icon.ico?">
</head>
<body>

    <!-- Div principal -->
    <main id="main" class="main">

        <!-- Título -->
        <h1 class="title">Pugberto Dancing Music Analyzer</h1>

        <!-- Contenedor de controles -->
        <div id="control_wrapper" class="controller">

            <!-- Contenedor de botones de opción -->
            <!-- <div class="wrapper" style="gap: 0.5rem;">

                Botón de opción
                <div class="radioButtonContainer">
                    <input type="radio" name="" id="file_choice" class="radio_btn">
                    <label for="file_choice" class="option">Usar archivo local</label>
                </div>
                
                Botón de opción
                <div class="radioButtonContainer">
                    <input type="radio" name="" id="live_choice" class="radio_btn">
                    <label for="live_choice" class="option">Usar micrófono</label>
                </div>

            </div> -->
    
            <!-- Input para subir archivo de música -->
            <div class="input_wrapper">

                <!-- Input de archivo -->
                <div id="input_file" class="input_file_container">

                    <!-- ícono de subir archivo -->
                    <i class="material-icons text-black">upload</i>

                    <!-- Input file -->
                    <input type="file" name="upload-music" class="input_file" id="file" accept="audio/*">
                </div>

            </div>
            
            <!-- Reproductor de audio -->
            <audio id="audio_player" controls class="audioPlayer"> 
            </audio>
        </div>

        <!-- Contenedor de las animaciones -->
        <div id="animationParent" class="animationParent">
            <!-- Contenedor de los pugbertos -->
            <div id="pugbertosContainer" class="pugbertosContainer">
            </div>
    
            <!-- canvas -->
            <canvas id="canvas" class="canvas" style="background-color: #000;margin-top:1rem"></canvas>
        </div>

    </main>

    <!-- Lógica general -->
    <script type="module" src="logic/index.js"></script>

</body>
</html>
